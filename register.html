<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Crear cuenta · SmartQueue</title>
<meta name="description" content="Crea tu cuenta gratuita en SmartQueue." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="/css/styles.css" />
<!-- FAVICONS Y ICONOS -->
<link rel="icon" type="image/png" href="assets/images/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<link rel="shortcut icon" href="assets/images/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon-removebg-preview.png">
<meta name="apple-mobile-web-app-title" content="SmartQueue">
<link rel="manifest" href="assets/images/site.webmanifest">
<script type="module" src="/js/theme.js"></script>
</head>
<body>
<nav class="sq-nav">
  <div class="container d-flex align-items-center justify-content-between py-3">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
  <img src="assets/images/apple-touch-icon-removebg-preview.png" 
       alt="SmartQueue" 
       class="sq-logo-img me-2">
  <span style="font-weight: 700;">SmartQueue</span>
</a>
    <div class="d-flex gap-2">
      <button class="sq-theme-btn" data-theme-toggle><span data-theme-icon>🌙</span></button>
      <a class="btn btn-outline-soft" href="/login.html">Iniciar sesión</a>
    </div>
  </div>
</nav>
<main class="sq-auth-wrap">
  <div class="sq-card sq-auth-card">
    <h1>Crea tu cuenta</h1>
    <p class="muted">Empieza a gestionar tus turnos en menos de 2 minutos.</p>
    <form id="register-form" class="mt-4" novalidate>
      <div class="mb-3">
        <label class="form-label" for="name">Nombre</label>
        <input id="name" type="text" class="form-control" required minlength="2" autocomplete="name" />
      </div>
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input id="email" type="email" class="form-control" required autocomplete="email" />
      </div>
      <div class="mb-3 password-wrapper">
  <label class="form-label" for="password">Contraseña</label>
  <div class="input-group">
    <input 
      type="password" 
      class="form-control" 
      id="password" 
      name="password" 
      required 
      autocomplete="new-password"
      minlength="6"
    >
    <span class="pass-icon" id="toggle-register">👁️</span>
  </div>
  <div class="form-text password-hint">
    Mínimo 6 caracteres. Debe incluir: <strong>mayúscula</strong>, 
    <strong>minúscula</strong>, <strong>número</strong> y 
    <strong>símbolo especial</strong>.
  </div>
</div>
      <button id="submit" class="btn btn-gradient w-100 mt-2" type="submit">Crear cuenta</button>
      <p class="muted small mt-3 mb-0 text-center">¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a></p>
    </form>
  </div>
</main>

<footer class="sq-footer">
  <div class="container d-flex flex-wrap gap-3 justify-content-between">
    <div class="d-flex align-items-center gap-2">
    <img src="assets/images/apple-touch-icon-removebg-preview.png" 
         alt="SmartQueue" 
         style="width: 32px; height: 32px; object-fit: contain;">
    <strong>SmartQueue</strong> 
    <span class="ms-2">© Aarón Delgado 2ºSMR</span>
</div>
</footer>

<script type="module" src="/js/register.js"></script>
<script src="js/password-toggle.js"></script>
</body>
</html>
