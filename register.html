<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crear cuenta · SmartQueue</title>
<meta name="description" content="Crea tu cuenta gratuita en SmartQueue." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="/css/styles.css" />
<script type="module" src="/js/theme.js"></script>
</head>
<body>
<nav class="sq-nav">
  <div class="container d-flex align-items-center justify-content-between py-3">
    <a class="navbar-brand" href="/index.html"><span class="sq-logo"></span> SmartQueue</a>
    <div class="d-flex gap-2">
      <button class="sq-theme-btn" data-theme-toggle><span data-theme-icon>🌙</span></button>
      <a class="btn btn-outline-soft" href="/login.html">Iniciar sesión</a>
    </div>
  </div>
</nav>
<main class="sq-auth-wrap">
  <div class="sq-card sq-auth-card">
    <h1>Crea tu cuenta</h1>
    <p class="muted">Empieza a gestionar tus turnos en menos de 2 minutos.</p>
    <form id="register-form" class="mt-4" novalidate>
      <div class="mb-3">
        <label class="form-label" for="name">Nombre</label>
        <input id="name" type="text" class="form-control" required minlength="2" autocomplete="name" />
      </div>
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input id="email" type="email" class="form-control" required autocomplete="email" />
      </div>
      <div class="mb-3">
  <label class="form-label" for="password">Contraseña</label>
  <input 
    type="password" 
    class="form-control" 
    id="password" 
    name="password" 
    required 
    autocomplete="new-password"
    minlength="6"
  >
  <div class="form-text password-hint">
    Mínimo 6 caracteres. Debe incluir: <strong>mayúscula</strong>, 
    <strong>minúscula</strong>, <strong>número</strong> y 
    <strong>símbolo especial</strong>.
  </div>
</div>
      <button id="submit" class="btn btn-gradient w-100 mt-2" type="submit">Crear cuenta</button>
      <p class="muted small mt-3 mb-0 text-center">¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a></p>
    </form>
  </div>
</main>
<script type="module" src="/js/register.js"></script>
</body>
</html>
