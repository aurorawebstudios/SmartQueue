<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQueue - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">
    
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">SmartQueue</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link text-success" id="userGreeting"></span>
                    </li>
                    <li class="nav-item">
                        <button onclick="authManager.logout()" class="btn btn-outline-light btn-sm ms-3">
                            <i class="fas fa-sign-out-alt"></i> Salir
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            
            <!-- Bienvenida -->
            <div class="col-12 mb-5">
                <div class="d-flex justify-content-between align-items-end">
                    <div>
                        <h1 class="display-5 fw-bold" id="welcomeMessage">Bienvenido de nuevo</h1>
                        <p class="text-muted fs-5" id="userEmail"></p>
                    </div>
                    <button onclick="solicitarNuevoTurno()" class="btn btn-primary btn-lg px-5">
                        <i class="fas fa-plus me-2"></i> Solicitar Nuevo Turno
                    </button>
                </div>
            </div>

            <!-- Tickets Activos -->
            <div class="col-12 col-lg-8">
                <div class="card bg-dark border-secondary h-100">
                    <div class="card-header bg-dark border-secondary">
                        <h5 class="mb-0"><i class="fas fa-ticket-alt me-2"></i> Mis Turnos Activos</h5>
                    </div>
                    <div class="card-body" id="ticketsContainer">
                        <div id="noTickets" class="text-center py-5 text-muted">
                            <i class="fas fa-inbox fa-3x mb-3"></i>
                            <p>No tienes turnos activos</p>
                            <button onclick="solicitarNuevoTurno()" class="btn btn-outline-primary">Solicitar uno ahora</button>
                        </div>
                        <div id="ticketsList" class="row"></div>
                    </div>
                </div>
            </div>

            <!-- Información Rápida -->
            <div class="col-12 col-lg-4">
                <div class="card bg-dark border-secondary mb-4">
                    <div class="card-body">
                        <h6 class="text-primary mb-3">Estado del Sistema</h6>
                        <div id="systemStatus" class="text-success fw-bold">
                            <i class="fas fa-circle"></i> En línea
                        </div>
                        <small class="text-muted" id="currentService"></small>
                    </div>
                </div>

                <div class="card bg-dark border-secondary">
                    <div class="card-body">
                        <h6 class="mb-3">¿Cómo funciona?</h6>
                        <ol class="small text-muted">
                            <li>Solicita un turno</li>
                            <li>Guarda tu código QR</li>
                            <li>Espera tu turno en tiempo real</li>
                            <li>Recibe notificación cuando sea tu turno</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal QR -->
    <div class="modal fade" id="qrModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Tu Código QR</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <div id="qrcode" class="mx-auto"></div>
                    <p class="mt-3 mb-1 fw-bold" id="modalTicketNumber"></p>
                    <small class="text-muted" id="modalServiceName"></small>
                </div>
                <div class="modal-footer border-secondary">
                    <button onclick="printQR()" class="btn btn-outline-light">
                        <i class="fas fa-print"></i> Imprimir
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/qr-generator.js"></script>
    <script src="js/dashboard.js"></script>

    <script>
        // Inicializar dashboard cuando cargue
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.currentUser) {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
