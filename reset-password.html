<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SmartQueue - Nueva Contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <!-- FAVICONS Y ICONOS -->
<link rel="icon" type="image/png" href="assets/images/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<link rel="shortcut icon" href="assets/images/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon-removebg-preview.png">
<meta name="apple-mobile-web-app-title" content="SmartQueue">
<link rel="manifest" href="assets/images/site.webmanifest">
</head>
<body class="sq-auth-wrap">
  <div class="sq-auth-card">
    <div class="text-center mb-4">
      <h2 class="mb-1">Nueva Contraseña</h2>
      <p class="text-muted">Para <strong id="user-email"></strong></p>
    </div>

    <form id="reset-form">
      <div class="mb-3">
        <label class="form-label">Nueva Contraseña</label>
        <input type="password" id="new-password" class="form-control" required minlength="6">
        <div class="form-text">
          Mínimo 6 caracteres. Debe incluir mayúscula, minúscula, número y símbolo.
        </div>
      </div>

      <button type="submit" id="submit-btn" class="btn btn-primary w-100 mb-3">
        Guardar Nueva Contraseña
      </button>
    </form>

    <div class="text-center">
      <a href="login.html" class="text-decoration-none">← Volver al inicio de sesión</a>
    </div>
  </div>

  <footer class="sq-footer">
  <div class="container d-flex flex-wrap gap-3 justify-content-between">
    <div class="d-flex align-items-center gap-2">
    <img src="assets/images/apple-touch-icon-removebg-preview.png" 
         alt="SmartQueue" 
         style="width: 32px; height: 32px; object-fit: contain;">
    <strong>SmartQueue</strong> 
    <span class="ms-2">© Aarón Delgado 2ºSMR</span>
</div>
</footer>

  <script type="module" src="js/reset-password.js"></script>
</body>
</html>
