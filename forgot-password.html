<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQueue - Recuperar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card shadow-lg border-0" style="max-width: 420px; width: 100%;">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">Recuperar Contraseña</h3>
                <form id="forgotForm">
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control bg-dark text-light border-secondary" id="email" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3">Enviar enlace de recuperación</button>
                </form>
                <div class="text-center mt-3">
                    <a href="login.html" class="text-primary">Volver al inicio de sesión</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const result = await authManager.forgotPassword(email);
            if (result.success) {
                alert('Se ha enviado un enlace de recuperación a tu correo.');
            } else {
                alert('Error: ' + result.error);
            }
        });
    </script>
</body>
</html>
