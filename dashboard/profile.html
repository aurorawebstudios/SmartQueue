<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mi Perfil - SmartQueue</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <!-- FAVICONS Y ICONOS -->
<link rel="icon" type="image/png" href="assets/images/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<link rel="shortcut icon" href="assets/images/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon-removebg-preview.png">
<meta name="apple-mobile-web-app-title" content="SmartQueue">
<link rel="manifest" href="assets/images/site.webmanifest">
</head>
<body>
  <div class="sq-shell">

    <aside class="sq-side">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
  <img src="assets/images/apple-touch-icon-removebg-preview.png" 
       alt="SmartQueue" 
       class="sq-logo-img me-2">
  <span style="font-weight: 700;">SmartQueue</span>
</a>
      <div class="nav-section">Cuenta</div>
      <a href="/dashboard.html" class="side-link">🏠 <span>Inicio</span></a>
      <a href="/dashboard/profile.html" class="side-link active">⚙️ <span>Mi Perfil</span></a>
    </aside>

    <main class="sq-main d-flex align-items-center justify-content-center min-vh-100">
      <div class="sq-card p-4 p-md-5" style="max-width: 620px; width: 100%;">
        
        <h2 class="text-center mb-4">Mi Perfil</h2>

        <h5 class="mb-3">Información de la cuenta</h5>
        
        <div class="mb-4">
          <p><strong>Nombre:</strong> <span id="profile-name" class="text-light">-</span></p>
          <p><strong>Email:</strong> <span id="profile-email" class="text-light">-</span></p>
          <p><strong>Fecha de registro:</strong> <span id="profile-created" class="text-light">-</span></p>
          <p><strong>Rol:</strong> <span id="profile-role" class="text-light">-</span></p>
        </div>

        <hr class="my-4">

        <h5 class="mb-3">Acciones</h5>
        <div class="d-grid gap-2">
          <button class="btn btn-outline-primary" id="btn-change-name">Cambiar Nombre</button>
          <button class="btn btn-outline-primary" id="btn-change-email">Cambiar Email</button>
          <button class="btn btn-outline-danger" id="btn-delete-account">Eliminar Cuenta</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../js/profile.js"></script>
</body>
</html>
