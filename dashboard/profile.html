<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SmartQueue - Mi Perfil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="sq-shell">
    <!-- Aquí puedes incluir el sidebar si quieres (opcional) -->
    <div class="sq-main">
      <h1>Mi Perfil</h1>
      <div class="sq-card p-4">
        <h5>Información de la cuenta</h5>
        <p><strong>Nombre:</strong> <span id="profile-name"></span></p>
        <p><strong>Email:</strong> <span id="profile-email"></span></p>
        <p><strong>Fecha de registro:</strong> <span id="profile-created"></span></p>
        <p><strong>Rol:</strong> <span id="profile-role"></span></p>

        <hr>
        <h5 class="mt-4">Acciones</h5>
        <button class="btn btn-outline-primary mb-2 w-100" id="btn-change-name">Cambiar Nombre</button>
        <button class="btn btn-outline-primary mb-2 w-100" id="btn-change-email">Cambiar Email</button>
        <button class="btn btn-outline-danger w-100" id="btn-delete-account">Eliminar Cuenta</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/profile.js"></script>
</body>
</html>
