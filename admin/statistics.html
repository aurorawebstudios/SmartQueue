<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas - SmartQueue Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="d-flex">
        <div id="sidebar"></div>
        
        <div class="flex-grow-1 p-5">
            <h1 class="display-6 fw-bold mb-5">Estadísticas del Sistema</h1>
            
            <div class="row g-4">
                <!-- KPI Cards -->
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="text-muted">Turnos Hoy</h6>
                            <h2 id="todayTickets" class="display-4 fw-bold text-primary">87</h2>
                            <p class="text-success small mb-0">↑ 12% vs ayer</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="text-muted">Tiempo Promedio</h6>
                            <h2 id="avgWait" class="display-4 fw-bold">14<span class="fs-5">min</span></h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="text-muted">Tasa de Atención</h6>
                            <h2 id="attendanceRate" class="display-4 fw-bold text-success">94%</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="text-muted">Usuarios Activos</h6>
                            <h2 id="activeUsers" class="display-4 fw-bold">142</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mt-4">
                <!-- Gráficos -->
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">Evolución Semanal</h5>
                            <canvas id="ticketsChart" height="120"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h5 class="card-title">Estado Actual</h5>
                            <canvas id="statusChart" height="180"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { protectRoute, logoutUser } from '../js/auth.js';
        import { createTicketsChart, createStatusChart } from '../js/chart-manager.js';

        protectRoute('admin');

        // Cargar Sidebar
        fetch('../components/sidebar-admin.html')
            .then(res => res.text())
            .then(html => document.getElementById('sidebar').innerHTML = html);

        let ticketsChart, statusChart;

        function initCharts() {
            const ticketsCtx = document.getElementById('ticketsChart');
            const statusCtx = document.getElementById('statusChart');
            
            if (ticketsCtx) ticketsChart = createTicketsChart(ticketsCtx.getContext('2d'));
            if (statusCtx) statusChart = createStatusChart(statusCtx.getContext('2d'));
        }

        window.onload = () => {
            initCharts();
        };

        window.logoutUser = logoutUser;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
