<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escanear QR - SmartQueue Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="bg-light">
    <div class="d-flex">
        <!-- Sidebar -->
        <div id="sidebar"></div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-5">
            <h1 class="display-6 fw-bold mb-4">Escanear Código QR</h1>
            
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card border-0 shadow-lg">
                        <div class="card-body p-5 text-center">
                            <i class="bi bi-qr-code-scan display-1 text-primary mb-4"></i>
                            <h4 class="mb-3">Apunta la cámara al código QR del usuario</h4>
                            <p class="text-muted mb-5">El sistema detectará automáticamente el turno</p>
                            
                            <div id="scanResult" class="mb-4"></div>
                            
                            <button onclick="simulateScan()" class="btn btn-primary btn-lg px-5">
                                Simular Escaneo (Demo)
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { protectRoute, logoutUser } from '../js/auth.js';
        import { markAsAttended } from '../js/queue-service.js';

        protectRoute('admin');

        // Cargar sidebar
        fetch('../components/sidebar-admin.html')
            .then(res => res.text())
            .then(html => document.getElementById('sidebar').innerHTML = html);

        window.simulateScan = async () => {
            const ticketId = prompt("Ingresa el ID del ticket para simular escaneo:");
            if (!ticketId) return;

            try {
                await markAsAttended(ticketId);
                document.getElementById('scanResult').innerHTML = `
                    <div class="alert alert-success">
                        <h5>✅ Turno marcado como atendido</h5>
                        <p>ID: ${ticketId}</p>
                    </div>
                `;
            } catch (e) {
                alert("Error: " + e.message);
            }
        };

        window.logoutUser = logoutUser;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
