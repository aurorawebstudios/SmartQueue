<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQueue - Panel de Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-dark text-light">
    
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="bg-dark border-end border-secondary" style="width: 260px; min-height: 100vh; position: fixed;">
            <div class="p-4">
                <h4 class="fw-bold text-primary mb-4">SmartQueue <span class="badge bg-danger">Admin</span></h4>
                
                <div class="nav flex-column">
                    <a href="index.html" class="nav-link active text-white mb-2"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                    <a href="services.html" class="nav-link text-white mb-2"><i class="fas fa-list me-2"></i> Servicios</a>
                    <a href="tickets.html" class="nav-link text-white mb-2"><i class="fas fa-ticket-alt me-2"></i> Turnos</a>
                    <a href="users.html" class="nav-link text-white mb-2"><i class="fas fa-users me-2"></i> Usuarios</a>
                    <a href="statistics.html" class="nav-link text-white mb-2"><i class="fas fa-chart-bar me-2"></i> Estadísticas</a>
                </div>
            </div>
        </div>

        <!-- Contenido Principal -->
        <div style="margin-left: 260px; width: 100%;">
            <!-- Topbar -->
            <nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-4 py-3">
                <div class="container-fluid">
                    <h5 class="mb-0 fw-semibold" id="pageTitle">Dashboard Administrativo</h5>
                    <div class="d-flex align-items-center gap-3">
                        <span class="text-success"><i class="fas fa-circle"></i> En línea</span>
                        <button onclick="authManager.logout()" class="btn btn-outline-light btn-sm">
                            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                        </button>
                    </div>
                </div>
            </nav>

            <div class="p-4">
                <div class="row g-4">
                    <!-- Tarjetas de resumen -->
                    <div class="col-md-3">
                        <div class="card bg-dark border-success">
                            <div class="card-body">
                                <h5 class="text-success">Turnos en Espera</h5>
                                <h2 class="fw-bold mb-0" id="waitingCount">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-dark border-primary">
                            <div class="card-body">
                                <h5 class="text-primary">Turnos Atendidos Hoy</h5>
                                <h2 class="fw-bold mb-0" id="attendedToday">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-dark border-warning">
                            <div class="card-body">
                                <h5 class="text-warning">Servicios Activos</h5>
                                <h2 class="fw-bold mb-0" id="activeServices">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-dark border-info">
                            <div class="card-body">
                                <h5 class="text-info">Usuarios Totales</h5>
                                <h2 class="fw-bold mb-0" id="totalUsers">0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Turnos Activos -->
                <div class="card bg-dark border-secondary mt-4">
                    <div class="card-header border-secondary d-flex justify-content-between">
                        <h5>Turnos en Cola</h5>
                        <button onclick="refreshAdminData()" class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-sync"></i> Actualizar
                        </button>
                    </div>
                    <div class="card-body" id="adminTicketsList">
                        <!-- Se llena con JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/admin-utils.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.currentUser || window.currentUserRole !== 'admin') {
                alert("Acceso denegado. Solo administradores.");
                window.location.href = '../login.html';
            }
            loadAdminDashboard();
        });
    </script>
</body>
</html>
