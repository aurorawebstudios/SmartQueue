<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - SmartQueue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="bg-light">
    <div class="d-flex">
        <!-- Sidebar -->
        <div id="sidebar"></div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <h1 class="display-6 fw-bold">Dashboard Administrativo</h1>
                <div class="d-flex gap-3">
                    <button id="themeToggle" class="btn btn-outline-secondary">🌙</button>
                    <span id="adminName" class="align-self-center"></span>
                </div>
            </div>

            <div class="row g-4">
                <!-- Stats Cards -->
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="text-muted">Turnos en Espera</h6>
                            <h2 id="waitingCount" class="display-4 fw-bold text-primary">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="text-muted">Servicios Activos</h6>
                            <h2 id="activeServices" class="display-4 fw-bold text-success">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="text-muted">Usuarios Totales</h6>
                            <h2 id="totalUsers" class="display-4 fw-bold">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <h6 class="text-muted">Turnos Atendidos Hoy</h6>
                            <h2 id="attendedToday" class="display-4 fw-bold text-info">0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Turnos en Cola -->
            <div class="card border-0 shadow-sm mt-5">
                <div class="card-header bg-white">
                    <h5>Turnos en Cola (Tiempo Real)</h5>
                </div>
                <div class="card-body" id="liveQueue">
                    <!-- Llenado dinámico -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { protectRoute, isAdmin, logoutUser } from '../js/auth.js';
        import { getServices, listenToQueue } from '../js/queue-service.js';

        protectRoute('admin');

        async function loadAdminDashboard() {
            const user = await isAdmin();
            if (!user) return;

            document.getElementById('adminName').textContent = "Administrador";

            // Cargar stats (simulado por ahora)
            document.getElementById('waitingCount').textContent = "18";
            document.getElementById('activeServices').textContent = "5";
            document.getElementById('totalUsers').textContent = "238";
            document.getElementById('attendedToday').textContent = "76";
        }

        // Cargar sidebar
        fetch('../components/sidebar-admin.html')
            .then(res => res.text())
            .then(html => document.getElementById('sidebar').innerHTML = html);

        window.onload = loadAdminDashboard;
        window.logoutUser = logoutUser;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
