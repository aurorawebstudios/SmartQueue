<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQueue - Gestión de Turnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-dark text-light">
    <!-- Sidebar y Navbar iguales que en las otras páginas (copia del patrón) -->
    <div class="d-flex">
        <div class="bg-dark border-end border-secondary" style="width: 260px; min-height: 100vh; position: fixed;">
            <!-- Sidebar igual que en index.html -->
            <div class="p-4">
                <h4 class="fw-bold text-primary mb-4">SmartQueue <span class="badge bg-danger">Admin</span></h4>
                <div class="nav flex-column">
                    <a href="index.html" class="nav-link text-white mb-2"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                    <a href="services.html" class="nav-link text-white mb-2"><i class="fas fa-list me-2"></i> Servicios</a>
                    <a href="tickets.html" class="nav-link active text-white mb-2"><i class="fas fa-ticket-alt me-2"></i> Turnos</a>
                    <a href="users.html" class="nav-link text-white mb-2"><i class="fas fa-users me-2"></i> Usuarios</a>
                    <a href="statistics.html" class="nav-link text-white mb-2"><i class="fas fa-chart-bar me-2"></i> Estadísticas</a>
                </div>
            </div>
        </div>

        <div style="margin-left: 260px; width: 100%;">
            <nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-4 py-3">
                <h5 class="mb-0">Gestión de Turnos</h5>
            </nav>

            <div class="p-4">
                <div class="card bg-dark border-secondary" id="allTicketsList">
                    <!-- Llenado por JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/admin-utils.js"></script>
    <script>
        async function loadAllTickets() {
            const snapshot = await db.collection('tickets').orderBy('createdAt', 'desc').get();
            let html = '<table class="table table-dark"><thead><tr><th>Ticket</th><th>Usuario</th><th>Servicio</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>';

            snapshot.forEach(doc => {
                const t = doc.data();
                const statusBadge = t.status === 'waiting' ? 'bg-warning' : t.status === 'calling' ? 'bg-info' : 'bg-success';
                html += `
                    <tr>
                        <td><strong>${t.ticketNumber}</strong></td>
                        <td>${t.userId}</td>
                        <td>${t.serviceName}</td>
                        <td><span class="badge ${statusBadge}">${t.status}</span></td>
                        <td>
                            <button onclick="markAsAttended('${doc.id}')" class="btn btn-sm btn-success">Atendido</button>
                        </td>
                    </tr>`;
            });

            html += '</tbody></table>';
            document.getElementById('allTicketsList').innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.currentUserRole !== 'admin') return;
            loadAllTickets();
        });
    </script>
</body>
</html>
