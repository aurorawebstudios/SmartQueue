<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Turnos - SmartQueue Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <!-- FAVICONS Y ICONOS -->
<link rel="icon" type="image/png" href="assets/images/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<link rel="shortcut icon" href="assets/images/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon-removebg-preview.png">
<meta name="apple-mobile-web-app-title" content="SmartQueue">
<link rel="manifest" href="assets/images/site.webmanifest">
</head>
<body>
    <div class="d-flex">
        <div id="sidebar"></div>
        
        <div class="flex-grow-1 p-5">
            <h1 class="display-6 fw-bold mb-4">Gestión de Turnos</h1>
            
            <div class="card border-0 shadow-sm">
                <div class="card-body" id="ticketsList">
                    <!-- Llenado dinámico -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { protectRoute, logoutUser } from '../js/auth.js';
        import { getActiveTicket, markAsAttended } from '../js/queue-service.js';

        protectRoute('admin');

        fetch('../components/sidebar-admin.html')
            .then(res => res.text())
            .then(html => document.getElementById('sidebar').innerHTML = html);

        async function loadTickets() {
            // Por simplicidad mostramos tickets en espera
            const container = document.getElementById('ticketsList');
            container.innerHTML = `
                <div class="alert alert-info">
                    Sistema de turnos en tiempo real listo. Usa el Dashboard para ver cola activa.
                </div>
            `;
        }

        window.onload = loadTickets;
        window.logoutUser = logoutUser;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
