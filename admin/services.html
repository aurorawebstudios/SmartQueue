<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Servicios - SmartQueue Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <!-- FAVICONS Y ICONOS -->
<link rel="icon" type="image/png" href="assets/images/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<link rel="shortcut icon" href="assets/images/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon-removebg-preview.png">
<meta name="apple-mobile-web-app-title" content="SmartQueue">
<link rel="manifest" href="assets/images/site.webmanifest">
</head>
<body>
    <div class="d-flex">
        <div id="sidebar"></div>
        
        <div class="flex-grow-1 p-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="display-6 fw-bold">Gestión de Servicios</h1>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newServiceModal">
                    <i class="bi bi-plus-lg"></i> Nuevo Servicio
                </button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle" id="servicesTable">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Nuevo Servicio -->
    <div class="modal fade" id="newServiceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Servicio</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="newServiceForm">
                        <div class="mb-3">
                            <label class="form-label">Nombre del Servicio</label>
                            <input type="text" class="form-control" id="serviceName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" id="serviceDesc" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="createNewService()">Crear Servicio</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { protectRoute, logoutUser } from '../js/auth.js';
        import { createService, getAllServices } from '../js/admin-service.js';

        protectRoute('admin');

        fetch('../components/sidebar-admin.html')
            .then(res => res.text())
            .then(html => document.getElementById('sidebar').innerHTML = html);

        async function loadServices() {
            const services = await getAllServices();
            const tbody = document.querySelector('#servicesTable tbody');
            tbody.innerHTML = '';

            services.forEach(service => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${service.name}</strong></td>
                    <td>${service.description || '-'}</td>
                    <td><span class="badge bg-success">Activo</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteService('${service.id}')">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        window.createNewService = async () => {
            const name = document.getElementById('serviceName').value;
            const desc = document.getElementById('serviceDesc').value;
            
            if (!name) return alert("El nombre es obligatorio");
            
            await createService({ name, description: desc });
            alert("✅ Servicio creado correctamente");
            bootstrap.Modal.getInstance(document.getElementById('newServiceModal')).hide();
            loadServices();
        };

        window.deleteService = async (id) => {
            if (confirm("¿Eliminar este servicio?")) {

                alert("Servicio eliminado (simulado)");
                loadServices();
            }
        };

        window.onload = loadServices;
        window.logoutUser = logoutUser;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
