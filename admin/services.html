<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQueue - Gestionar Servicios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-dark text-light">
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="bg-dark border-end border-secondary" style="width: 260px; min-height: 100vh; position: fixed;">
            <div class="p-4">
                <h4 class="fw-bold text-primary mb-4">SmartQueue <span class="badge bg-danger">Admin</span></h4>
                <div class="nav flex-column">
                    <a href="index.html" class="nav-link text-white mb-2"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
                    <a href="services.html" class="nav-link active text-white mb-2"><i class="fas fa-list me-2"></i> Servicios</a>
                    <a href="tickets.html" class="nav-link text-white mb-2"><i class="fas fa-ticket-alt me-2"></i> Turnos</a>
                    <a href="users.html" class="nav-link text-white mb-2"><i class="fas fa-users me-2"></i> Usuarios</a>
                    <a href="statistics.html" class="nav-link text-white mb-2"><i class="fas fa-chart-bar me-2"></i> Estadísticas</a>
                </div>
            </div>
        </div>

        <div style="margin-left: 260px; width: 100%;">
            <nav class="navbar navbar-dark bg-dark border-bottom border-secondary px-4 py-3">
                <h5 class="mb-0">Gestión de Servicios</h5>
                <button onclick="authManager.logout()" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
            </nav>

            <div class="p-4">
                <button onclick="showCreateServiceModal()" class="btn btn-primary mb-4">
                    <i class="fas fa-plus"></i> Nuevo Servicio
                </button>

                <div class="card bg-dark border-secondary" id="servicesList">
                    <!-- Llenado por JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Crear/Editar Servicio -->
    <div class="modal fade" id="serviceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle">Nuevo Servicio</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="serviceId">
                    <div class="mb-3">
                        <label>Nombre del Servicio</label>
                        <input type="text" id="serviceName" class="form-control bg-dark text-light" required>
                    </div>
                    <div class="mb-3">
                        <label>Descripción</label>
                        <textarea id="serviceDesc" class="form-control bg-dark text-light" rows="3"></textarea>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="serviceActive" class="form-check-input" checked>
                        <label class="form-check-label">Servicio Activo</label>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button onclick="saveService()" class="btn btn-primary">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/admin-utils.js"></script>

    <script>
        let currentEditId = null;

        async function loadServices() {
            const snapshot = await db.collection('services').get();
            let html = '<div class="list-group">';

            snapshot.forEach(doc => {
                const s = doc.data();
                html += `
                    <div class="list-group-item bg-dark border-secondary d-flex justify-content-between align-items-center">
                        <div>
                            <strong>${s.name}</strong><br>
                            <small class="text-muted">${s.description || ''}</small>
                        </div>
                        <div>
                            <span class="badge ${s.isActive ? 'bg-success' : 'bg-secondary'}">${s.isActive ? 'Activo' : 'Inactivo'}</span>
                            <button onclick="editService('${doc.id}')" class="btn btn-sm btn-outline-primary ms-2">Editar</button>
                            <button onclick="deleteService('${doc.id}')" class="btn btn-sm btn-outline-danger ms-1">Eliminar</button>
                        </div>
                    </div>`;
            });

            html += '</div>';
            document.getElementById('servicesList').innerHTML = html || '<p class="text-muted">No hay servicios creados</p>';
        }

        function showCreateServiceModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'Nuevo Servicio';
            document.getElementById('serviceName').value = '';
            document.getElementById('serviceDesc').value = '';
            document.getElementById('serviceActive').checked = true;
            new bootstrap.Modal(document.getElementById('serviceModal')).show();
        }

        async function saveService() {
            const name = document.getElementById('serviceName').value;
            const desc = document.getElementById('serviceDesc').value;
            const active = document.getElementById('serviceActive').checked;

            if (!name) return alert("El nombre es obligatorio");

            try {
                if (currentEditId) {
                    await db.collection('services').doc(currentEditId).update({
                        name, description: desc, isActive: active
                    });
                } else {
                    await db.collection('services').add({
                        name,
                        description: desc,
                        isActive: active,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                bootstrap.Modal.getInstance(document.getElementById('serviceModal')).hide();
                loadServices();
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        async function editService(id) {
            currentEditId = id;
            const doc = await db.collection('services').doc(id).get();
            const s = doc.data();

            document.getElementById('modalTitle').textContent = 'Editar Servicio';
            document.getElementById('serviceName').value = s.name;
            document.getElementById('serviceDesc').value = s.description || '';
            document.getElementById('serviceActive').checked = s.isActive;

            new bootstrap.Modal(document.getElementById('serviceModal')).show();
        }

        async function deleteService(id) {
            if (confirm("¿Eliminar este servicio?")) {
                await db.collection('services').doc(id).delete();
                loadServices();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!window.currentUser || window.currentUserRole !== 'admin') {
                window.location.href = '../login.html';
                return;
            }
            loadServices();
        });
    </script>
</body>
</html>
