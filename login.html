<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Iniciar sesión · SmartQueue</title>
<meta name="description" content="Accede a tu cuenta de SmartQueue." />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="/css/styles.css" />
<!-- FAVICONS Y ICONOS -->
<link rel="icon" type="image/png" href="assets/images/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<link rel="shortcut icon" href="assets/images/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon-removebg-preview.png">
<meta name="apple-mobile-web-app-title" content="SmartQueue">
<link rel="manifest" href="assets/images/site.webmanifest">
<script type="module" src="js/theme.js"></script>
</head>
<body>
<nav class="sq-nav">
  <div class="container d-flex align-items-center justify-content-between py-3">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
  <img src="assets/images/apple-touch-icon-removebg-preview.png" 
       alt="SmartQueue" 
       class="sq-logo-img me-2">
  <span style="font-weight: 700;">SmartQueue</span>
</a>
    <div class="d-flex gap-2">
      <button class="sq-theme-btn" data-theme-toggle><span data-theme-icon>🌙</span></button>
      <a class="btn btn-outline-soft" href="/register.html">Crear cuenta</a>
    </div>
  </div>
</nav>
<main class="sq-auth-wrap">
  <div class="sq-card sq-auth-card">
    <h1>Bienvenido de vuelta</h1>
    <p class="muted">Inicia sesión para gestionar tus turnos.</p>
    <form id="login-form" class="mt-4" novalidate>
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input id="email" type="email" class="form-control" required autocomplete="email" />
      </div>
      <div class="mb-2">
        <label class="form-label d-flex justify-content-between" for="password">
          <span>Contraseña</span>
          <a href="/forgot-password.html" class="small">¿Olvidaste tu contraseña?</a>
        </label>
        <input id="password" type="password" class="form-control" required autocomplete="current-password" minlength="6" />
      </div>
      <button id="submit" class="btn btn-primary w-100 mt-3" type="submit">Iniciar sesión</button>
      <p class="muted small mt-3 mb-0 text-center">¿No tienes cuenta? <a href="/register.html">Regístrate</a></p>
    </form>
  </div>
</main>

<footer class="sq-footer">
  <div class="container d-flex flex-wrap gap-3 justify-content-between">
    <div class="d-flex align-items-center gap-2">
    <img src="assets/images/apple-touch-icon-removebg-preview.png" 
         alt="SmartQueue" 
         style="width: 32px; height: 32px; object-fit: contain;">
    <strong>SmartQueue</strong> 
    <span class="ms-2">© Aarón Delgado 2ºSMR</span>
</div>
</footer>

<script type="module" src="/js/login.js"></script>
</body>
</html>
